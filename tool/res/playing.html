<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fefbff">
    <title>AutoAim Stream</title>
    <style>
        :root {
            color-scheme: light;
            --color-page: #fefbff;
            --color-page-glow: rgba(0, 89, 199, 0.12);
            --color-panel: #f2f3fc;
            --color-panel-strong: #eaeefb;
            --color-card: #e2e8f8;
            --color-video: #10131a;
            --color-text: #1b1b1f;
            --color-muted: #44464f;
            --color-subtle: #575e71;
            --color-line: #c5c6d0;
            --color-primary: #0059c7;
            --color-primary-strong: #0059c7;
            --color-primary-soft: #d9e2ff;
            --color-danger-soft: #d9e2ff;
            --shadow-panel: 0 10px 24px -18px rgba(0, 0, 0, 0.08);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --gap-lg: 16px;
            --gap-sm: 10px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--color-page);
            color: var(--color-text);
            font-family: "Noto Sans", "Microsoft YaHei", sans-serif;
        }

        body {
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(0, 89, 199, 0.16);
            background: var(--color-page);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
            gap: var(--gap-lg);
            height: 100%;
            padding:
                max(var(--gap-lg), env(safe-area-inset-top)) max(var(--gap-lg), env(safe-area-inset-right)) max(var(--gap-lg), env(safe-area-inset-bottom)) max(var(--gap-lg), env(safe-area-inset-left));
            overflow-x: hidden;
        }

        .stream-pane,
        .side-panel {
            border: 1px solid var(--color-line);
            background: var(--color-panel);
            box-shadow: var(--shadow-panel);
        }

        .stream-pane {
            min-height: 0;
            overflow: hidden;
            border-radius: var(--radius-xl);
            position: relative;
        }

        .stream-pane::before {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            content: "";
            border: 1px solid rgba(255, 255, 255, 0.48);
            border-radius: inherit;
            box-shadow: inset 0 0 0 1px rgba(0, 89, 199, 0.08);
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--color-video);
        }

        .side-panel,
        .panel-group {
            display: flex;
            flex-direction: column;
        }

        .side-panel {
            min-height: 0;
            gap: var(--gap-lg);
            padding: 18px;
            border-radius: var(--radius-xl);
            backdrop-filter: none;
        }

        .panel-group h1,
        .panel-group h2,
        .panel-group p {
            margin: 0;
        }

        .panel-group p {
            color: var(--color-muted);
            line-height: 1.5;
            overflow-wrap: anywhere;
        }

        .panel-group {
            gap: var(--gap-sm);
            min-width: 0;
            padding: 16px;
            border: 1px solid var(--color-line);
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, var(--color-panel-strong), var(--color-card));
        }

        .panel-group h1,
        .panel-group h2 {
            color: var(--color-text);
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
            text-wrap: balance;
        }

        .capture-button,
        .record-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 12px 24px;
            border: 1px solid var(--color-line);
            border-radius: 999px;
            background: var(--color-card);
            color: var(--color-primary-strong);
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            line-height: 20px;
            cursor: pointer;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
            user-select: none;
        }

        .capture-button:not(:disabled):hover,
        .record-button:not(:disabled):hover {
            border-color: var(--color-primary);
            background: var(--color-primary-soft);
            color: var(--color-primary);
            transform: translateY(-1px);
        }

        .capture-button:focus-visible,
        .record-button:focus-visible {
            outline: 3px solid rgba(0, 89, 199, 0.42);
            outline-offset: 3px;
        }

        .capture-button:not(:disabled):active,
        .record-button:not(:disabled):active {
            transform: translateY(0);
            background: #cfdcff;
        }

        .record-button.is-recording {
            border-color: var(--color-primary);
            background: var(--color-danger-soft);
            color: var(--color-primary);
        }

        .record-context {
            display: grid;
            gap: 8px;
            color: var(--color-muted);
            font-size: 13px;
            line-height: 1.4;
            font-variant-numeric: tabular-nums;
        }

        .context-row {
            display: grid;
            grid-template-columns: max-content minmax(0, 1fr);
            gap: var(--gap-sm);
        }

        .context-row>span:first-child {
            color: var(--color-subtle);
        }

        .context-value {
            min-width: 0;
            overflow-wrap: anywhere;
            color: var(--color-text);
            font-family: monospace;
        }

        .capture-button:disabled,
        .record-button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;
        }

        .playback-row {
            display: flex;
            gap: 8px;
        }

        .playback-row > button {
            flex: 1;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        @media (max-width: 960px) {
            body {
                overflow: auto;
            }

            .layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100%;
            }

            .stream-pane {
                min-height: 52vh;
            }

            .side-panel {
                border-radius: var(--radius-lg);
            }
        }

        @media (max-width: 520px) {
            .layout {
                gap: 12px;
                padding: 12px;
            }

            .stream-pane {
                min-height: 42vh;
                border-radius: var(--radius-lg);
            }

            .side-panel {
                padding: 12px;
            }

            .capture-button,
            .record-button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="layout" aria-label="自瞄串流播放器">
        <section class="stream-pane" aria-label="视频串流">
            <video id="video" autoplay muted controls playsinline aria-label="AutoAim 实时视频"></video>
        </section>
        <aside class="side-panel">

            <section class="panel-group">
                <h1>自瞄串流播放器</h1>
                <p>关注 <span translate="no">Alliance</span> 战队喵！</p>
            </section>
            <button id="capture-button" class="capture-button" type="button" disabled>捕获画面</button>
            <button id="record-button" class="record-button" type="button" disabled>
                <span class="record-button-label">开始录制</span>
            </button>

            <div style="height: 10px; flex: 0 0 auto;" aria-hidden="true"></div>

            <section class="panel-group">
                <h2>远程录制控制</h2>
                <p>HFYU 录制格式，约 1.4&nbsp;MB 每帧，压缩比 3:1，注意硬盘空间哦</p>
                <div class="record-context" aria-live="polite">
                    <div class="context-row">
                        <span>录制</span>
                        <span id="backend-record-on-value" class="context-value">未知</span>
                    </div>
                    <div class="context-row">
                        <span>状态</span>
                        <span id="backend-status-value" class="context-value">等待录制状态</span>
                    </div>
                    <div class="context-row">
                        <span>文件</span>
                        <span id="backend-filename-value" class="context-value">-</span>
                    </div>
                </div>
            </section>
            <button id="backend-record-button" class="record-button" type="button" disabled>等待录制状态</button>

            <div style="height: 10px; flex: 0 0 auto;" aria-hidden="true"></div>

            <section class="panel-group">
                <h2>播放控制</h2>
                <p>适用于 player 回放</p>
                <div class="playback-row">
                    <button id="prev-btn" class="capture-button" type="button">-1</button>
                    <button id="play-pause-btn" class="capture-button" type="button">暂停</button>
                    <button id="next-btn" class="capture-button" type="button">+1</button>
                </div>
            </section>


        </aside>
    </main>

    <script>
        const WHEP_URL = `${window.location.protocol}//${window.location.hostname || 'localhost'}:8889/autoaim/whep`;

        /** @type {RTCPeerConnection | null} */
        let peerConnection = null;
        /** @type {string | null} */
        let sessionUrl = null;
        /** @type {ReturnType<typeof setTimeout> | null} */
        let retryTimer = null;
        /** @type {MediaStream | null} */
        let currentStream = null;
        /** @type {MediaRecorder | null} */
        let recorder = null;

        let stopped = false;
        let lastFrameAt = 0;
        let lastPlaybackTime = 0;
        let recordingWanted = false;
        /** @type {boolean | null} */
        let backendRecordOn = null;
        /** @type {boolean} */
        let recorderAvailable = false;
        /** @type {BlobPart[]} */
        let recordedChunks = [];
        /** @type {'playing' | 'paused'} */
        let playbackStatus = 'playing';
        /** @type {boolean} */
        let playerAvailable = false;

        /** @type {HTMLVideoElement} */
        const video = document.getElementById('video');
        /** @type {HTMLButtonElement} */
        const recordButton = document.getElementById('record-button');
        /** @type {HTMLButtonElement} */
        const captureButton = document.getElementById('capture-button');
        /** @type {HTMLSpanElement} */
        const recordButtonLabel = document.querySelector('.record-button-label');
        /** @type {HTMLButtonElement} */
        const backendRecordButton = document.getElementById('backend-record-button');
        /** @type {HTMLButtonElement} */
        const prevButton = document.getElementById('prev-btn');
        /** @type {HTMLButtonElement} */
        const playPauseButton = document.getElementById('play-pause-btn');
        /** @type {HTMLButtonElement} */
        const nextButton = document.getElementById('next-btn');
        /** @type {HTMLSpanElement} */
        const backendRecordOnValue = document.getElementById('backend-record-on-value');
        /** @type {HTMLSpanElement} */
        const backendStatusValue = document.getElementById('backend-status-value');
        /** @type {HTMLSpanElement} */
        const backendFilenameValue = document.getElementById('backend-filename-value');

        video.addEventListener('play', () => {
            playbackStatus = 'playing';
            lastFrameAt = Date.now();
            lastPlaybackTime = video.currentTime;
        });

        video.addEventListener('pause', () => {
            playbackStatus = 'paused';
        });
        recordButton.addEventListener('click', () => {
            if (recordingWanted) {
                stopRecording();
            } else {
                startRecording();
            }
        });
        captureButton.addEventListener('click', captureFrame);
        backendRecordButton.addEventListener('click', toggleBackendRecording);
        prevButton.addEventListener('click', () => sendPlaybackCommand('/api/step_backward'));
        playPauseButton.addEventListener('click', () => sendPlaybackCommand('/api/play_pause'));
        nextButton.addEventListener('click', () => sendPlaybackCommand('/api/step_forward'));

        function updateLocalActionButtons() {
            const hasStream = Boolean(currentStream);
            captureButton.disabled = !hasStream;
            recordButton.disabled = !hasStream && !recordingWanted;
        }

        function updateRecordButton() {
            if (recordingWanted) {
                recordButtonLabel.textContent = '录制中';
            } else {
                recordButtonLabel.textContent = '开始录制';
            }
            recordButton.classList.toggle('is-recording', recordingWanted);
            updateLocalActionButtons();
        }

        function updateBackendRecordButton() {
            if (!recorderAvailable || backendRecordOn === null) {
                backendRecordButton.textContent = '等待录制状态';
                backendRecordButton.disabled = true;
                return;
            }

            backendRecordButton.textContent = backendRecordOn ? '停止远程录制' : '开启远程录制';
            backendRecordButton.disabled = false;
        }

        /** @type {boolean} */
        let isPlaying = true;

        function updatePlaybackButtons() {
            if (!playerAvailable) {
                prevButton.disabled = true;
                playPauseButton.disabled = true;
                nextButton.disabled = true;
                playPauseButton.textContent = '暂停';
                return;
            }
            prevButton.disabled = isPlaying;
            playPauseButton.disabled = false;
            nextButton.disabled = isPlaying;
            playPauseButton.textContent = isPlaying ? '暂停' : '播放';
        }

        async function sendPlaybackCommand(url) {
            try {
                await fetch(url, { method: 'POST', body: '1' });
            } catch (error) {
                console.error('Playback command failed:', error);
            }
        }

        async function fetchRecordContext() {
            try {
                const response = await fetch('/api/context', {cache: 'no-store'});
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const recordContext = data.context || {};
                recorderAvailable = Boolean(recordContext.recorderAvailable);
                backendRecordOn = Boolean(recordContext.recordOn);
                backendRecordOnValue.textContent = backendRecordOn ? '开启' : '关闭';
                backendStatusValue.textContent = recordContext.recordStatus || '-';
                backendFilenameValue.textContent = recordContext.filename || '-';
                playerAvailable = Boolean(recordContext.playerAvailable);
                isPlaying = Boolean(recordContext.playing);
            } catch (error) {
                recorderAvailable = false;
                backendRecordOn = null;
                backendRecordOnValue.textContent = '未知';
                backendStatusValue.textContent = '状态不可用';
                backendFilenameValue.textContent = '-';
                playerAvailable = false;
                isPlaying = true;
                console.error('Failed to fetch record context:', error);
            }

            updateBackendRecordButton();
            updatePlaybackButtons();
        }

        async function sendRecordCommand(value) {
            backendRecordButton.disabled = true;
            try {
                const response = await fetch('/api/record', {
                    method: 'POST',
                    body: value,
                });
                if (!response.ok) {
                    console.error('Record command failed:', response.status);
                    return;
                }
                await fetchRecordContext();
            } catch (error) {
                console.error('Failed to send record command:', error);
            } finally {
                updateBackendRecordButton();
            }
        }

        function toggleBackendRecording() {
            if (backendRecordOn === null) {
                return;
            }
            sendRecordCommand(backendRecordOn ? '0' : '1');
        }

        function downloadRecording() {
            if (!recordedChunks.length) {
                return;
            }

            const blob = new Blob(recordedChunks, {type: 'video/webm'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `autoaim-${Date.now()}.webm`;
            link.click();
            URL.revokeObjectURL(url);
            recordedChunks = [];
        }

        function ensureRecording() {
            if (!recordingWanted || recorder || !currentStream) {
                return;
            }

            recorder = new MediaRecorder(currentStream, {mimeType: 'video/webm'});
            recorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            recorder.onstop = () => {
                recorder = null;
                if (!recordingWanted) {
                    downloadRecording();
                    return;
                }
                ensureRecording();
            };
            recorder.start();
        }

        function startRecording() {
            recordingWanted = true;
            updateRecordButton();
            ensureRecording();
        }

        function stopRecording() {
            recordingWanted = false;
            updateRecordButton();

            if (recorder) {
                recorder.stop();
                return;
            }

            downloadRecording();
        }

        function captureFrame() {
            if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA || !video.videoWidth || !video.videoHeight) {
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const context = canvas.getContext('2d');
            if (!context) {
                return;
            }

            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
                if (!blob) {
                    return;
                }

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `autoaim-frame-${Date.now()}.png`;
                link.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        /** @param {RTCPeerConnection} peer @returns {Promise<void>} */
        function waitForIceComplete(peer) {
            if (peer.iceGatheringState === 'complete') {
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                const onStateChange = () => {
                    if (peer.iceGatheringState !== 'complete') {
                        return;
                    }

                    peer.removeEventListener('icegatheringstatechange', onStateChange);
                    resolve();
                };

                peer.addEventListener('icegatheringstatechange', onStateChange);
            });
        }

        function cleanup() {
            lastFrameAt = 0;
            lastPlaybackTime = 0;
            currentStream = null;
            updateLocalActionButtons();

            if (retryTimer) {
                clearTimeout(retryTimer);
                retryTimer = null;
            }

            if (peerConnection) {
                peerConnection.ontrack = null;
                peerConnection.onconnectionstatechange = null;
                peerConnection.close();
                peerConnection = null;
            }

            if (sessionUrl) {
                fetch(sessionUrl, {method: 'DELETE'}).catch(() => { });
                sessionUrl = null;
            }
        }

        /** @param {RTCPeerConnection} peer */
        function watchVideoFrames(peer) {
            if (typeof video.requestVideoFrameCallback !== 'function') {
                return;
            }

            video.requestVideoFrameCallback(() => {
                if (peer !== peerConnection) {
                    return;
                }

                lastFrameAt = Date.now();
                watchVideoFrames(peer);
            });
        }

        /** @param {number} [delayMs=2000] */
        function scheduleReconnect(delayMs = 2000) {
            if (stopped || retryTimer) {
                return;
            }

            cleanup();
            retryTimer = setTimeout(() => {
                retryTimer = null;
                connect();
            }, delayMs);
        }

        async function connect() {
            cleanup();

            const peer = new RTCPeerConnection({iceServers: []});
            peerConnection = peer;

            peer.addTransceiver('video', {direction: 'recvonly'});
            peer.ontrack = (event) => {
                if (peer !== peerConnection) {
                    return;
                }

                lastFrameAt = Date.now();
                lastPlaybackTime = video.currentTime;

                event.track.onended = () => {
                    if (peer === peerConnection) {
                        scheduleReconnect(0);
                    }
                };

                video.srcObject = event.streams[0];
                currentStream = event.streams[0];
                updateLocalActionButtons();
                ensureRecording();
                watchVideoFrames(peer);
            };
            peer.onconnectionstatechange = () => {
                if (peer !== peerConnection) {
                    return;
                }

                const state = peer.connectionState;
                if (state === 'disconnected') {
                    scheduleReconnect(0);
                    return;
                }

                if (state === 'failed' || state === 'closed') {
                    scheduleReconnect();
                }
            };

            try {
                const offer = await peer.createOffer();
                await peer.setLocalDescription(offer);
                await waitForIceComplete(peer);

                if (peer !== peerConnection || !peer.localDescription) {
                    return;
                }

                const response = await fetch(WHEP_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/sdp'},
                    body: peer.localDescription.sdp,
                });
                if (response.status !== 201) {
                    throw new Error(`HTTP ${response.status}`);
                }

                if (peer !== peerConnection) {
                    return;
                }

                sessionUrl = new URL(response.headers.get('location'), WHEP_URL).toString();
                const answer = await response.text();
                await peer.setRemoteDescription({type: 'answer', sdp: answer});
            } catch (error) {
                if (peer !== peerConnection) {
                    return;
                }

                console.error('[playing]', error);
                scheduleReconnect();
            }
        }

        window.addEventListener('beforeunload', () => {
            stopped = true;
            recordingWanted = false;
            if (recorder) {
                recorder.stop();
            }
            cleanup();
        });

        setInterval(() => {
            if (stopped || retryTimer || !peerConnection || !video.srcObject || playbackStatus !== 'playing') {
                return;
            }

            const now = Date.now();

            if (typeof video.requestVideoFrameCallback !== 'function') {
                if (video.currentTime !== lastPlaybackTime) {
                    lastPlaybackTime = video.currentTime;
                    lastFrameAt = now;
                }
            }

            if (lastFrameAt && now - lastFrameAt > 1200) {
                scheduleReconnect(0);
            }
        }, 400);

        updateRecordButton();
        fetchRecordContext();
        setInterval(fetchRecordContext, 1000);
        connect();
    </script>
</body>

</html>
