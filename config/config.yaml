localhost_develop: false
use_visualization: true

camera_matrix:
  [
    1.722231837421459e+03,
    0.,
    7.013056440882832e+02,
    0.,
    1.724876404292754e+03,
    5.645821718351237e+02,
    0.,
    0.,
    1.,
  ]
distort_coeff: [-0.064232403853946, -0.087667493884102, 0, 0, 0.792381808294582]

capturer:
  show_loss_framerate: false
  show_loss_framerate_interval: 500
  reconnect_wait_interval: 100

  record_enable: false
  saving_pathes:
    ["/home/root/autoaim/", "/home/ubuntu/autoaim/", "/tmp/autoaim/"]
  max_duration_seconds: 60
  record_fps: 24
  max_videos_size_gb: 50

  # source: "local_video"
  source: "hikcamera"

  hikcamera:
    # int
    timeout_ms: 500
    # float
    exposure_us: 2000.0
    # float
    framerate: 120
    # float
    gain: 16.9807

    invert_image: false
    software_sync: false
    trigger_mode: false
    fixed_framerate: false

  local_video:
    # 替换为你具体的路径
    location: "/path/to/your/video"
    # double 帧率
    frame_rate: 40
    # bool 是否循环播放
    loop_play: true
    # bool 是否允许跳帧以满足实时性
    allow_skipping: false

identifier:
  binarization_threshold: 0.5

  # openvino infer
  model_location: "shenzhen-0526.onnx"
  # model_location: "shenzhen-0708.onnx"
  # model_location: "tongji-yolov5.xml"

  infer_device: "AUTO"
  use_roi_segment: false
  roi_rows: 640
  roi_cols: 640
  input_rows: 640
  input_cols: 640
  min_confidence: 0.5
  score_threshold: 0.7
  nms_threshold: 0.3

  green_light_filter:
    green_threshold: 120
    min_area: 20
    min_circularity: 0.6
    max_aspect_ratio: 1.5

tracker:
  # enemy_color: red
  enemy_color: blue

pose_estimator:
  distance_optimizer: true

  fixed_outpost_pitch: true
  fixed_normal_pitch: false

  outpost_armor_thickness: 0.02

fire_control:
  initial_bullet_speed: 21.4 # m/s
  shoot_delay: 0.07 # s
  mpc_enable: true
  yaw_offset: 0.0 # degree
  pitch_offset: 0.0 # degree

  aim_point_chooser:
    coming_angle: 70.0 # degree
    leaving_angle: 20.0 # degree
    outpost_coming_angle: 70.0 # degree
    outpost_leaving_angle: 20.0 # degree

  mpc:
    mpc_max_yaw_acc: 50.0
    mpc_yaw_q_angle: 9000000.0
    mpc_yaw_q_rate: 0.0
    mpc_yaw_r_acc: 1.0
    mpc_max_pitch_acc: 100.0
    mpc_pitch_q_angle: 9000000.0
    mpc_pitch_q_rate: 0.0
    mpc_pitch_r_acc: 1.0

  shoot_evaluator:
    is_lazy_gimbal: false
    near_angle_tolerance: 3 # degree
    far_angle_tolerance: 2 # degree
    split_distance: 2 # m

visualization:
  publishable: true
  drawable: true

  enable_stream: true
  framerate: 60
  monitor_host: "127.0.0.1"
  monitor_port: "5000"
  stream_type: "RTP_H264"
