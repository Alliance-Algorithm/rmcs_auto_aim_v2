use_visualization: true
use_painted_image: true
is_local_runtime: true

capturer:
  show_loss_framerate: false
  show_loss_framerate_interval: 500
  reconnect_wait_interval: 100
  # hikcamera or local_video
  source: "hikcamera"
  hikcamera:
    # int
    timeout_ms: 500
    # float
    exposure_us: 2000.0
    # float
    framerate: 120
    # float
    gain: 16.9807

    invert_image: false
    software_sync: false
    trigger_mode: false
    fixed_framerate: false
  local_video:
    # 替换为你具体的路径
    location: "/workspaces/alliance/test_videos/outpost.mp4"
    # double 帧率
    frame_rate: 60
    # bool 是否循环播放
    loop_play: true
    # bool 是否允许跳帧以满足实时性
    allow_skipping: false

identifier:
  binarization_threshold: 0.5

  # openvino infer
  avaliable_models:
    - "tongji-yolov5.xml"
    - "shenzhen-0526.onnx"
    - "shenzhen-0708.onnx"
  model_location: "tongji-yolov5.xml"
  infer_device: "AUTO"
  use_roi_segment: false
  roi_rows: 640
  roi_cols: 640
  input_rows: 640
  input_cols: 640
  min_confidence: 0.5
  score_threshold: 0.7
  nms_threshold: 0.3

tracker:
  # blue or red
  enemy_color: red
  max_temporary_loss_frames: 4
  max_unconfirmed_loss_frames: 2
  tracking_confirm_frames: 2

pose_estimator:
  camera_matrix:
    [
      1.722231837421459e+03,
      0,
      7.013056440882832e+02,
      0,
      1.724876404292754e+03,
      5.645821718351237e+02,
      0,
      0,
      1,
    ]
  distort_coeff:
    [-0.064232403853946, -0.087667493884102, 0, 0, 0.792381808294582]

  transforms:
    - parent: "imu_link"
      child: "pitch_link"
      t: [0., 0., 0.]
      q: [1., 0., 0., 0.]
    - parent: "pitch_link"
      child: "muzzle_link"
      t: [0., 0., 0.]
      q: [1., 0., 0., 0.]
    - parent: "pitch_link"
      child: "camera_link"
      t: [0., 0., 0.]
      q: [1., 0., 0., 0.]

fire_control:
  initial_bullet_speed: 26.6 # m/s
  shoot_delay: 0.1 # s
  yaw_offset: 0.0 # degree
  pitch_offset: 0.0 # degree

  coming_angle: 70.0 # degree
  leaving_angle: 20.0 # degree
  outpost_coming_angle: 70.0 # degree
  outpost_leaving_angle: 30.0 # degree
  angular_velocity_threshold: 120 # degree/s

  first_tolerance: 3 # 近距离射击容差，degree
  second_tolerance: 2 # 远距离射击容差，degree
  judge_distance: 2 #距离判断阈值
  auto_fire: true # 是否由自瞄控制射击

visualization:
  framerate: 60
  monitor_host: "127.0.0.1"
  monitor_port: "5000"
  stream_type: "RTP_JEPG"
