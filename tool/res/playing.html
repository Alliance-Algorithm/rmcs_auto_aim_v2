<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f6f7fc">
    <script>try {const t = localStorage.getItem('theme'); if (t) document.documentElement.dataset.theme = t;} catch { }</script>
    <title>AutoAim Stream</title>
    <style>
        :root {
            color-scheme: light dark;
            --page: light-dark(#f6f7fc, #0e1015);
            --surface: light-dark(#ffffff, #171922);
            --surface-2: light-dark(#eef0f8, #20232e);
            --outline: light-dark(rgba(23, 26, 33, 0.09), rgba(228, 226, 236, 0.1));
            --text: light-dark(#171a21, #e4e2ec);
            --muted: light-dark(#5c6272, #a3a8b8);
            --primary: light-dark(#0b57d0, #a8c7fa);
            --primary-container: light-dark(#d3e3fd, #0842a0);
            --on-primary-container: light-dark(#041e49, #d3e3fd);
            --danger-container: light-dark(#f9dedc, #8c1d18);
            --on-danger-container: light-dark(#410e0b, #f9dedc);
            --danger: light-dark(#b3261e, #f2b8b5);
            --ok: light-dark(#146c2e, #7ddba3);
            --video-bg: #0a0c10;
            --shadow: 0 1px 3px light-dark(rgba(16, 24, 40, 0.08), rgba(0, 0, 0, 0.4)),
                0 12px 32px -16px light-dark(rgba(16, 24, 40, 0.18), rgba(0, 0, 0, 0.5));
            --radius-xl: 24px;
            --radius-md: 16px;
        }

        :root[data-theme="light"] {
            color-scheme: light;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            color: var(--text);
            font-family: system-ui, "Noto Sans", "Microsoft YaHei", sans-serif;
        }

        body {
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background:
                radial-gradient(120% 70% at 80% -20%, color-mix(in srgb, var(--primary) 12%, transparent), transparent 60%),
                var(--page);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
            gap: 16px;
            height: 100%;
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .stream-pane,
        .side-panel {
            border: 1px solid var(--outline);
            border-radius: var(--radius-xl);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .stream-pane {
            position: relative;
            min-height: 0;
            overflow: hidden;
            background: var(--video-bg);
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stream-overlay {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stream-status,
        .stream-toggle {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(10, 12, 16, 0.55);
            color: #e7e9f2;
            backdrop-filter: blur(10px);
        }

        .stream-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .stream-toggle {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 160ms ease;
        }

        .stream-toggle:hover {
            background: rgba(10, 12, 16, 0.75);
        }

        .stream-toggle:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.6);
            outline-offset: 2px;
        }

        .stream-toggle .icon {
            width: 15px;
            height: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9aa0ab;
        }

        .stream-status[data-tone="live"] .status-dot {
            background: #34d399;
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.25);
        }

        .stream-status[data-tone="idle"] .status-dot {
            background: #fbbf24;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            50% {
                opacity: 0.35;
            }
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 0;
            padding: 18px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 2px;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            flex: none;
            border-radius: 14px;
            background: var(--primary-container);
            color: var(--on-primary-container);
        }

        .brand-mark img {
            display: none;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
        }

        .brand-mark.has-image img {
            display: block;
        }

        .brand-mark.has-image svg {
            display: none;
        }

        .brand h1,
        .panel-group h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.25;
            text-wrap: balance;
        }

        .brand p,
        .panel-group p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
            overflow-wrap: anywhere;
        }

        .theme-toggle {
            position: relative;
            flex: none;
            width: 52px;
            height: 32px;
            margin-left: auto;
            padding: 0;
            border: 2px solid var(--outline);
            border-radius: 999px;
            background: var(--surface-2);
            cursor: pointer;
            transition: background-color 200ms ease, border-color 200ms ease;
        }

        .theme-toggle:hover {
            border-color: color-mix(in srgb, var(--primary) 35%, transparent);
        }

        .theme-toggle[aria-checked="true"] {
            border-color: transparent;
            background: var(--primary-container);
        }

        .theme-toggle[aria-checked="true"] .theme-thumb {
            left: calc(100% - 25px);
        }

        .theme-toggle .icon-moon,
        .theme-toggle[aria-checked="true"] .icon-sun {
            display: none;
        }

        .theme-toggle[aria-checked="true"] .icon-moon {
            display: block;
        }

        .theme-thumb {
            position: absolute;
            top: 50%;
            left: 3px;
            display: grid;
            place-items: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            color: light-dark(#ffffff, #0e1015);
            transform: translateY(-50%);
            transition: left 200ms ease;
        }

        .theme-thumb .icon {
            width: 13px;
            height: 13px;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .panel-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px;
            border: 1px solid var(--outline);
            border-radius: var(--radius-md);
            background: var(--surface-2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 10px 20px;
            border: 1px solid var(--outline);
            border-radius: 999px;
            background: var(--surface);
            color: var(--primary);
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: transform 160ms ease, background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .btn:not(:disabled):hover {
            transform: translateY(-1px);
            border-color: color-mix(in srgb, var(--primary) 35%, transparent);
            box-shadow: var(--shadow);
        }

        .btn:not(:disabled):active {
            transform: translateY(0) scale(0.98);
            box-shadow: none;
        }

        .btn:focus-visible,
        .theme-toggle:focus-visible {
            outline: 3px solid color-mix(in srgb, var(--primary) 40%, transparent);
            outline-offset: 2px;
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn--primary {
            border-color: transparent;
            background: var(--primary-container);
            color: var(--on-primary-container);
        }

        .btn.is-recording {
            border-color: transparent;
            background: var(--danger-container);
            color: var(--on-danger-container);
        }

        .icon {
            width: 18px;
            height: 18px;
            flex: none;
        }

        .icon-stop,
        .icon-play {
            display: none;
        }

        .is-recording .icon-stop,
        .is-paused .icon-play {
            display: block;
        }

        .is-recording .icon-record,
        .is-paused .icon-pause {
            display: none;
        }

        .record-context {
            display: grid;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        .context-row {
            display: grid;
            grid-template-columns: 3em minmax(0, 1fr);
            gap: 12px;
            padding: 8px 0;
        }

        .context-row+.context-row {
            border-top: 1px dashed var(--outline);
        }

        .context-row>span:first-child {
            color: var(--muted);
        }

        .context-value {
            min-width: 0;
            overflow-wrap: anywhere;
            font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
        }

        .context-value[data-on="true"] {
            color: var(--ok);
            font-weight: 700;
        }

        .playback-row {
            display: flex;
            gap: 8px;
        }

        .system-stats {
            display: grid;
            gap: 10px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 2.5em minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .stat-label {
            color: var(--muted);
        }

        .stat-value {
            font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
            font-variant-numeric: tabular-nums;
            text-align: right;
            white-space: nowrap;
        }

        .meter {
            height: 6px;
            border-radius: 999px;
            background: var(--surface);
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: var(--primary);
            transition: width 300ms ease, background-color 300ms ease;
        }

        .meter-fill.is-high {
            background: var(--danger);
        }

        .playback-row>.btn {
            flex: 1;
            padding: 10px 12px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        @media (max-width: 960px) {
            body {
                overflow: auto;
            }

            .layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100%;
            }

            .stream-pane {
                min-height: 52vh;
            }
        }

        @media (max-width: 520px) {
            .layout {
                gap: 12px;
                padding: 12px;
            }

            .stream-pane {
                min-height: 42vh;
                border-radius: var(--radius-md);
            }

            .side-panel {
                padding: 12px;
                border-radius: var(--radius-md);
            }
        }
    </style>
</head>

<body>
    <main class="layout" aria-label="自瞄串流播放器">
        <section class="stream-pane" aria-label="视频串流">
            <video id="video" autoplay muted playsinline aria-label="AutoAim 实时视频"></video>
            <div class="stream-overlay">
                <div class="stream-status" id="stream-status" data-tone="off">
                    <span class="status-dot" aria-hidden="true"></span>
                    <span id="stream-status-text">未连接</span>
                </div>
                <button id="video-toggle" class="stream-toggle" type="button" aria-label="播放">
                    <svg class="icon icon-pause" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="7" y="5" width="3.5" height="14" rx="1.2" />
                        <rect x="13.5" y="5" width="3.5" height="14" rx="1.2" />
                    </svg>
                    <svg class="icon icon-play" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8.5 5.8v12.4a.8.8 0 0 0 1.2.7l10-6.2a.8.8 0 0 0 0-1.4l-10-6.2a.8.8 0 0 0-1.2.7Z" />
                    </svg>
                </button>
            </div>
        </section>

        <aside class="side-panel">
            <header class="brand">
                <span class="brand-mark" id="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="7" />
                        <path d="M12 2v4M12 18v4M2 12h4M18 12h4" />
                    </svg>
                    <img id="brand-icon" alt="">
                </span>
                <div>
                    <h1>自瞄串流播放器</h1>
                    <p>关注 <span translate="no">Alliance</span> 战队喵！</p>
                </div>
                <button id="theme-toggle" class="theme-toggle" type="button" role="switch" aria-checked="false"
                    aria-label="切换深色模式">
                    <span class="theme-thumb">
                        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <circle cx="12" cy="12" r="4" />
                            <path
                                d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
                        </svg>
                        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
                        </svg>
                    </span>
                </button>
            </header>

            <div class="actions">
                <button id="capture-button" class="btn" type="button" disabled>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 8h3l2-3h6l2 3h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z" />
                        <circle cx="12" cy="13" r="3.5" />
                    </svg>
                    捕获画面
                </button>
                <button id="record-button" class="btn btn--primary" type="button" disabled>
                    <svg class="icon icon-record" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="6" />
                    </svg>
                    <svg class="icon icon-stop" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="7" y="7" width="10" height="10" rx="2" />
                    </svg>
                    <span class="record-button-label">开始录制</span>
                </button>
            </div>

            <section class="panel-group">
                <h2>远程录制</h2>
                <p>HFYU 录制格式，约 1.4&nbsp;MB 每帧，压缩比 3:1，注意硬盘空间哦</p>
                <div class="record-context" aria-live="polite">
                    <div class="context-row">
                        <span>录制</span>
                        <span id="backend-record-on-value" class="context-value">未知</span>
                    </div>
                    <div class="context-row">
                        <span>状态</span>
                        <span id="backend-status-value" class="context-value">等待录制状态</span>
                    </div>
                    <div class="context-row">
                        <span>文件</span>
                        <span id="backend-filename-value" class="context-value">-</span>
                    </div>
                </div>
                <button id="backend-record-button" class="btn" type="button" disabled>
                    <svg class="icon icon-record" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="6" />
                    </svg>
                    <svg class="icon icon-stop" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="7" y="7" width="10" height="10" rx="2" />
                    </svg>
                    <span id="backend-record-label">等待录制状态</span>
                </button>
            </section>

            <section class="panel-group">
                <h2>系统状态</h2>
                <p id="system-loadavg">负载 -</p>
                <div class="system-stats">
                    <div class="stat-row">
                        <span class="stat-label">CPU</span>
                        <div class="meter">
                            <div class="meter-fill" id="sys-cpu-meter"></div>
                        </div>
                        <span class="stat-value" id="sys-cpu-value">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">内存</span>
                        <div class="meter">
                            <div class="meter-fill" id="sys-mem-meter"></div>
                        </div>
                        <span class="stat-value" id="sys-mem-value">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">磁盘</span>
                        <div class="meter">
                            <div class="meter-fill" id="sys-disk-meter"></div>
                        </div>
                        <span class="stat-value" id="sys-disk-value">-</span>
                    </div>
                    <div class="stat-row" id="sys-proc-row">
                        <span class="stat-label">进程</span>
                        <div class="meter">
                            <div class="meter-fill" id="sys-proc-meter"></div>
                        </div>
                        <span class="stat-value" id="sys-proc-value">-</span>
                    </div>
                </div>
            </section>

            <section class="panel-group">
                <h2>播放控制</h2>
                <p>适用于 player 回放</p>
                <div class="playback-row">
                    <button id="prev-btn" class="btn" type="button">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 5v14" />
                            <path d="m17 6-6 6 6 6" />
                        </svg>
                        -1
                    </button>
                    <button id="play-pause-btn" class="btn" type="button">
                        <svg class="icon icon-pause" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="7" y="5" width="3.5" height="14" rx="1.2" />
                            <rect x="13.5" y="5" width="3.5" height="14" rx="1.2" />
                        </svg>
                        <svg class="icon icon-play" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M8.5 5.8v12.4a.8.8 0 0 0 1.2.7l10-6.2a.8.8 0 0 0 0-1.4l-10-6.2a.8.8 0 0 0-1.2.7Z" />
                        </svg>
                        <span id="play-pause-label">暂停</span>
                    </button>
                    <button id="next-btn" class="btn" type="button">
                        +1
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 5v14" />
                            <path d="m7 6 6 6-6 6" />
                        </svg>
                    </button>
                </div>
            </section>
        </aside>
    </main>

    <script>
        const WHEP_URL = `${window.location.protocol}//${window.location.hostname || 'localhost'}:8889/autoaim/whep`;

        /** @type {RTCPeerConnection | null} */
        let peerConnection = null;
        /** @type {string | null} */
        let sessionUrl = null;
        /** @type {ReturnType<typeof setTimeout> | null} */
        let retryTimer = null;
        /** @type {string[]} */
        let pendingIceCandidates = [];
        /** @type {MediaStream | null} */
        let currentStream = null;
        /** @type {MediaRecorder | null} */
        let recorder = null;
        /** @type {boolean | null} */
        let backendRecordOn = null;
        /** @type {BlobPart[]} */
        let recordedChunks = [];
        /** @type {'playing' | 'paused'} */
        let playbackStatus = 'playing';
        let connectAttempts = 0;
        let stopped = false;
        let lastFrameAt = 0;
        let lastPlaybackTime = 0;
        let recordingWanted = false;
        let recorderAvailable = false;
        let playerAvailable = false;
        let isPlaying = true;

        const $ = (id) => document.getElementById(id);
        const video = $('video'), videoToggle = $('video-toggle');
        const statusChip = $('stream-status'), statusText = $('stream-status-text');
        const brandMark = $('brand-mark'), brandIcon = $('brand-icon');
        const themeToggle = $('theme-toggle'), metaThemeColor = document.querySelector('meta[name="theme-color"]');
        const captureButton = $('capture-button'), recordButton = $('record-button'), recordButtonLabel = document.querySelector('.record-button-label');
        const backendRecordButton = $('backend-record-button'), backendRecordLabel = $('backend-record-label');
        const backendRecordOnValue = $('backend-record-on-value'), backendStatusValue = $('backend-status-value'), backendFilenameValue = $('backend-filename-value');
        const prevButton = $('prev-btn'), playPauseButton = $('play-pause-btn'), playPauseLabel = $('play-pause-label'), nextButton = $('next-btn');
        const systemLoadavg = $('system-loadavg');
        const sysCpuMeter = $('sys-cpu-meter'), sysCpuValue = $('sys-cpu-value');
        const sysMemMeter = $('sys-mem-meter'), sysMemValue = $('sys-mem-value');
        const sysDiskMeter = $('sys-disk-meter'), sysDiskValue = $('sys-disk-value');
        const sysProcRow = $('sys-proc-row'), sysProcMeter = $('sys-proc-meter'), sysProcValue = $('sys-proc-value');

        // CDN 图标：加载成功才替换默认准星图标，失败保持静默
        brandIcon.addEventListener('load', () => brandMark.classList.add('has-image'));
        brandIcon.src = 'https://r2.creeper5820.com/creeper-qt/ohtoai.png';

        // 主题：默认跟随系统，手动切换后记住选择
        const systemDark = matchMedia('(prefers-color-scheme: dark)');

        /** @param {'light' | 'dark' | null} theme null 表示跟随系统 */
        function applyTheme(theme) {
            if (theme) {
                document.documentElement.dataset.theme = theme;
            } else {
                delete document.documentElement.dataset.theme;
            }
            const dark = theme ? theme === 'dark' : systemDark.matches;
            themeToggle.setAttribute('aria-checked', String(dark));
            metaThemeColor.content = dark ? '#0e1015' : '#f6f7fc';
        }

        themeToggle.addEventListener('click', () => {
            const theme = themeToggle.getAttribute('aria-checked') === 'true' ? 'light' : 'dark';
            localStorage.setItem('theme', theme);
            applyTheme(theme);
        });

        systemDark.addEventListener('change', () => applyTheme(localStorage.getItem('theme')));
        applyTheme(localStorage.getItem('theme'));

        /** @param {string} text @param {'live' | 'idle' | 'off'} tone */
        function setStreamStatus(text, tone) {
            statusText.textContent = text;
            statusChip.dataset.tone = tone;
        }

        video.addEventListener('play', () => {
            playbackStatus = 'playing';
            lastFrameAt = Date.now();
            lastPlaybackTime = video.currentTime;
            updateVideoToggle();
        });

        video.addEventListener('pause', () => {
            playbackStatus = 'paused';
            updateVideoToggle();
        });

        function updateVideoToggle() {
            videoToggle.classList.toggle('is-paused', video.paused);
            videoToggle.setAttribute('aria-label', video.paused ? '播放' : '暂停');
        }

        videoToggle.addEventListener('click', () => {
            if (video.paused) {
                video.play().catch(() => { });
            } else {
                video.pause();
            }
        });
        updateVideoToggle();

        recordButton.addEventListener('click', () => recordingWanted ? stopRecording() : startRecording());
        captureButton.addEventListener('click', captureFrame);
        backendRecordButton.addEventListener('click', toggleBackendRecording);
        prevButton.addEventListener('click', () => sendPlaybackCommand('/api/step_backward'));
        playPauseButton.addEventListener('click', () => sendPlaybackCommand('/api/play_pause'));
        nextButton.addEventListener('click', () => sendPlaybackCommand('/api/step_forward'));

        function updateLocalActionButtons() {
            const hasStream = Boolean(currentStream);
            captureButton.disabled = !hasStream;
            recordButton.disabled = !hasStream && !recordingWanted;
        }

        function updateRecordButton() {
            recordButtonLabel.textContent = recordingWanted ? '录制中' : '开始录制';
            recordButton.classList.toggle('is-recording', recordingWanted);
            updateLocalActionButtons();
        }

        function updateBackendRecordButton() {
            const ready = recorderAvailable && backendRecordOn !== null;
            backendRecordButton.disabled = !ready;
            backendRecordButton.classList.toggle('is-recording', ready && backendRecordOn);
            backendRecordLabel.textContent = !ready ? '等待录制状态' : backendRecordOn ? '停止远程录制' : '开启远程录制';
        }

        function updatePlaybackButtons() {
            prevButton.disabled = !playerAvailable || isPlaying;
            nextButton.disabled = !playerAvailable || isPlaying;
            playPauseButton.disabled = !playerAvailable;
            playPauseButton.classList.toggle('is-paused', !isPlaying);
            playPauseLabel.textContent = isPlaying ? '暂停' : '播放';
        }

        async function sendPlaybackCommand(url) {
            try {
                await fetch(url, {method: 'POST', body: '1'});
            } catch (error) {
                console.error('Playback command failed:', error);
            }
        }

        function setMeter(fill, percent) {
            const valid = typeof percent === 'number';
            fill.style.width = `${valid ? Math.max(0, Math.min(100, percent)) : 0}%`;
            fill.classList.toggle('is-high', valid && percent > 80);
        }

        function updateSystemStats(system) {
            const s = system || {};
            systemLoadavg.textContent = s.loadAvg ? `负载 ${s.loadAvg}` : '负载 -';
            sysCpuValue.textContent = s.cpuPercent == null ? '-' : `${s.cpuPercent.toFixed(1)}%`;
            setMeter(sysCpuMeter, s.cpuPercent);
            sysMemValue.textContent = s.memUsedMb == null || s.memTotalMb == null ? '-'
                : `${(s.memUsedMb / 1024).toFixed(1)}/${(s.memTotalMb / 1024).toFixed(1)} GB`;
            setMeter(sysMemMeter, s.memPercent);
            sysDiskValue.textContent = s.diskUsedGb == null || s.diskTotalGb == null ? '-'
                : `${s.diskUsedGb.toFixed(1)}/${s.diskTotalGb.toFixed(1)} GB`;
            setMeter(sysDiskMeter, s.diskPercent);
            sysProcValue.textContent = !system ? '-' : s.procName == null ? '未运行'
                : `${s.procCpuPercent == null ? '-' : s.procCpuPercent.toFixed(1) + '%'} · ${s.procMemMb == null ? '-' : s.procMemMb + ' MB'}`;
            sysProcRow.title = s.procName || '';
            setMeter(sysProcMeter, s.procCpuPercent);
        }

        async function fetchRecordContext() {
            try {
                const response = await fetch('/api/context', {cache: 'no-store'});
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const recordContext = (await response.json()).context || {};
                recorderAvailable = Boolean(recordContext.recorderAvailable);
                backendRecordOn = Boolean(recordContext.recordOn);
                backendRecordOnValue.textContent = backendRecordOn ? '开启' : '关闭';
                backendRecordOnValue.dataset.on = backendRecordOn;
                backendStatusValue.textContent = recordContext.recordStatus || '-';
                backendFilenameValue.textContent = recordContext.filename || '-';
                playerAvailable = Boolean(recordContext.playerAvailable);
                isPlaying = Boolean(recordContext.playing);
                updateSystemStats(recordContext.system);
            } catch (error) {
                recorderAvailable = false;
                backendRecordOn = null;
                backendRecordOnValue.textContent = '未知';
                delete backendRecordOnValue.dataset.on;
                backendStatusValue.textContent = '状态不可用';
                backendFilenameValue.textContent = '-';
                playerAvailable = false;
                isPlaying = true;
                updateSystemStats(null);
                console.error('Failed to fetch record context:', error);
            }

            updateBackendRecordButton();
            updatePlaybackButtons();
        }

        async function sendRecordCommand(value) {
            backendRecordButton.disabled = true;
            try {
                const response = await fetch('/api/record', {method: 'POST', body: value});
                if (!response.ok) {
                    console.error('Record command failed:', response.status);
                    return;
                }
                await fetchRecordContext();
            } catch (error) {
                console.error('Failed to send record command:', error);
            } finally {
                updateBackendRecordButton();
            }
        }

        function toggleBackendRecording() {
            if (backendRecordOn === null) {
                return;
            }
            sendRecordCommand(backendRecordOn ? '0' : '1');
        }

        function downloadRecording() {
            if (!recordedChunks.length) {
                return;
            }

            const blob = new Blob(recordedChunks, {type: 'video/webm'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `autoaim-${Date.now()}.webm`;
            link.click();
            URL.revokeObjectURL(url);
            recordedChunks = [];
        }

        function ensureRecording() {
            if (!recordingWanted || recorder || !currentStream) {
                return;
            }

            recorder = new MediaRecorder(currentStream, {mimeType: 'video/webm'});
            recorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            recorder.onstop = () => {
                recorder = null;
                if (!recordingWanted) {
                    downloadRecording();
                    return;
                }
                ensureRecording();
            };
            recorder.start();
        }

        function startRecording() {
            recordingWanted = true;
            updateRecordButton();
            ensureRecording();
        }

        function stopRecording() {
            recordingWanted = false;
            updateRecordButton();

            if (recorder) {
                recorder.stop();
                return;
            }

            downloadRecording();
        }

        function captureFrame() {
            if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA || !video.videoWidth || !video.videoHeight) {
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const context = canvas.getContext('2d');
            if (!context) {
                return;
            }

            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
                if (!blob) {
                    return;
                }

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `autoaim-frame-${Date.now()}.png`;
                link.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        /** @param {RTCPeerConnection} peer @param {number} [timeoutMs=100] @returns {Promise<void>} */
        function waitForIceComplete(peer, timeoutMs = 100) {
            if (peer.iceGatheringState === 'complete') {
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    peer.removeEventListener('icegatheringstatechange', onStateChange);
                    resolve();
                }, timeoutMs);

                function onStateChange() {
                    if (peer.iceGatheringState !== 'complete') {
                        return;
                    }

                    clearTimeout(timeout);
                    peer.removeEventListener('icegatheringstatechange', onStateChange);
                    resolve();
                }

                peer.addEventListener('icegatheringstatechange', onStateChange);
            });
        }

        async function cleanup() {
            lastFrameAt = 0;
            lastPlaybackTime = 0;
            currentStream = null;
            setStreamStatus('未连接', 'off');
            updateLocalActionButtons();

            if (retryTimer) {
                clearTimeout(retryTimer);
                retryTimer = null;
            }

            pendingIceCandidates = [];

            if (peerConnection) {
                peerConnection.ontrack = null;
                peerConnection.onconnectionstatechange = null;
                peerConnection.onicecandidate = null;
                peerConnection.close();
                peerConnection = null;
            }

            if (sessionUrl) {
                try {
                    await fetch(sessionUrl, {method: 'DELETE'});
                } catch { }
                sessionUrl = null;
            }
        }

        /** @param {RTCPeerConnection} peer */
        function watchVideoFrames(peer) {
            if (typeof video.requestVideoFrameCallback !== 'function') {
                return;
            }

            video.requestVideoFrameCallback(() => {
                if (peer !== peerConnection) {
                    return;
                }

                if (peer.connectionState === 'connected') {
                    connectAttempts = 0;
                }
                lastFrameAt = Date.now();
                watchVideoFrames(peer);
            });
        }

        /** @param {number} [delayMs=500] */
        function scheduleReconnect(delayMs = 500) {
            if (stopped || retryTimer) {
                return;
            }

            retryTimer = setTimeout(() => {
                retryTimer = null;
                connect();
            }, delayMs);
        }

        const computeBackoff = (attempts) => Math.min(100 * 2 ** attempts, 2000);

        function scheduleReconnectWithBackoff() {
            if (stopped || retryTimer) {
                return;
            }
            scheduleReconnect(computeBackoff(connectAttempts));
            connectAttempts++;
        }

        async function connect() {
            await cleanup();
            setStreamStatus('连接中…', 'idle');

            const peer = new RTCPeerConnection({iceServers: []});
            peerConnection = peer;

            peer.addTransceiver('video', {direction: 'recvonly'});
            peer.onicecandidate = (event) => {
                if (peer !== peerConnection) {
                    return;
                }

                if (!event.candidate) {
                    return;
                }

                const candidateSdp = 'a=' + event.candidate.candidate + '\r\n';

                if (sessionUrl) {
                    fetch(sessionUrl, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/trickle-ice-sdpfrag'},
                        body: candidateSdp,
                    }).catch(() => { });
                } else {
                    pendingIceCandidates.push(candidateSdp);
                }
            };
            peer.ontrack = (event) => {
                if (peer !== peerConnection) {
                    return;
                }

                lastFrameAt = Date.now();
                lastPlaybackTime = video.currentTime;
                setStreamStatus('串流中', 'live');

                event.track.onended = () => {
                    if (peer === peerConnection) {
                        scheduleReconnectWithBackoff();
                    }
                };

                video.srcObject = event.streams[0];
                currentStream = event.streams[0];
                updateLocalActionButtons();
                ensureRecording();
                watchVideoFrames(peer);
            };
            peer.onconnectionstatechange = () => {
                if (peer !== peerConnection) {
                    return;
                }

                const state = peer.connectionState;
                if (state === 'disconnected') {
                    setStreamStatus('连接中断，重连中…', 'idle');
                    scheduleReconnect(0);
                    return;
                }

                if (state === 'failed' || state === 'closed') {
                    setStreamStatus('连接失败，重试中…', 'idle');
                    scheduleReconnectWithBackoff();
                }
            };

            try {
                const offer = await peer.createOffer();
                await peer.setLocalDescription(offer);
                await waitForIceComplete(peer);

                if (peer !== peerConnection || !peer.localDescription) {
                    return;
                }

                const response = await fetch(WHEP_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/sdp'},
                    body: peer.localDescription.sdp,
                });
                if (response.status !== 201) {
                    throw new Error(`HTTP ${response.status}`);
                }

                if (peer !== peerConnection) {
                    return;
                }

                sessionUrl = new URL(response.headers.get('location'), WHEP_URL).toString();

                for (const candidate of pendingIceCandidates) {
                    fetch(sessionUrl, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/trickle-ice-sdpfrag'},
                        body: candidate,
                    }).catch(() => { });
                }
                pendingIceCandidates = [];

                const answer = await response.text();
                await peer.setRemoteDescription({type: 'answer', sdp: answer});
            } catch (error) {
                if (peer !== peerConnection) {
                    return;
                }

                console.error('[playing]', error);
                setStreamStatus('连接失败，重试中…', 'idle');
                scheduleReconnectWithBackoff();
            }
        }

        window.addEventListener('beforeunload', () => {
            stopped = true;
            recordingWanted = false;
            if (recorder) {
                recorder.stop();
            }
            cleanup();
        });

        setInterval(() => {
            if (stopped || retryTimer || !peerConnection || !video.srcObject || playbackStatus !== 'playing') {
                return;
            }

            const now = Date.now();

            if (typeof video.requestVideoFrameCallback !== 'function') {
                if (video.currentTime !== lastPlaybackTime) {
                    lastPlaybackTime = video.currentTime;
                    lastFrameAt = now;
                    if (peerConnection?.connectionState === 'connected') {
                        connectAttempts = 0;
                    }
                }
            }

            if (lastFrameAt && now - lastFrameAt > 8000) {
                scheduleReconnect(0);
            }
        }, 400);

        updateRecordButton();
        fetchRecordContext();
        setInterval(fetchRecordContext, 1000);
        connect();
    </script>
</body>

</html>
