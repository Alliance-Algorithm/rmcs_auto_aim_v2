use_visualization: true
use_painted_image: true
is_local_runtime: false

capturer:
  show_loss_framerate: false
  show_loss_framerate_interval: 500
  reconnect_wait_interval: 100

  # source: "local_video"
  source: "hikcamera"
  hikcamera:
    # int
    timeout_ms: 500
    # float
    exposure_us: 2000.0
    # float
    framerate: 120
    # float
    gain: 16.9807

    invert_image: false
    software_sync: true
    trigger_mode: false
    fixed_framerate: true
  local_video:
    # 替换为你具体的路径
    location: "/workspaces/data/autoaim/1777297317784.avi"
    # double 帧率
    frame_rate: 60
    # bool 是否循环播放
    loop_play: true
    # bool 是否允许跳帧以满足实时性
    allow_skipping: false

identifier:
  binarization_threshold: 0.5

  # openvino infer
  model_location: "shenzhen-0526.onnx"
  # model_location: "shenzhen-0708.onnx"
  # model_location: "tongji-yolov5.xml"

  infer_device: "AUTO"
  use_roi_segment: false
  roi_rows: 640
  roi_cols: 640
  input_rows: 640
  input_cols: 640
  min_confidence: 0.5
  score_threshold: 0.7
  nms_threshold: 0.3

tracker:
  enemy_color: red
  # enemy_color: blue
  max_temporary_loss_frames: 4
  max_unconfirmed_loss_frames: 2
  tracking_confirm_frames: 2

pose_estimator:
  camera_matrix:
    [
      1.722231837421459e+03,
      0,
      7.013056440882832e+02,
      0,
      1.724876404292754e+03,
      5.645821718351237e+02,
      0,
      0,
      1,
    ]
  distort_coeff:
    [-0.064232403853946, -0.087667493884102, 0, 0, 0.792381808294582]

fire_control:
  initial_bullet_speed: 21.0 # m/s
  shoot_delay: 0.1 # s
  mpc_enable: true
  yaw_offset: 0.0 # degree
  pitch_offset: 0.0 # degree

  aim_point_chooser:
    coming_angle: 60.0      # degree
    leaving_angle: 30.0     # degree
    outpost_coming_angle: 70.0      # degree
    outpost_leaving_angle: 50.0     # degree
  mpc:
    mpc_max_yaw_acc: 50.0
    mpc_yaw_q_angle: 9000000.0
    mpc_yaw_q_rate: 0.0
    mpc_yaw_r_acc: 1.0
    mpc_max_pitch_acc: 100.0
    mpc_pitch_q_angle: 9000000.0
    mpc_pitch_q_rate: 0.0
    mpc_pitch_r_acc: 1.0

  shoot_evaluator:
    is_lazy_gimbal: true
    near_angle_tolerance: 3 # 近距离射击容差，degree
    far_angle_tolerance: 2 # 远距离射击容差，degree
    split_distance: 2 # 距离切换阈值,m
    auto_fire: true # 是否由自瞄控制射击

visualization:
  framerate: 50
  # monitor_host: "localhost"
  monitor_host: "192.168.3.125"
  monitor_port: "5000"
  stream_type: "RTP_JEPG"
